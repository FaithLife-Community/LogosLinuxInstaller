  # REF:
  # https://github.com/mmtrt/Wine-Builds/blob/master/build_wine.sh
  # https://gitlab.winehq.org/wine/wine/-/wikis/Building-Wine
  # https://gitlab.winehq.org/wine/wine/-/blob/wine-9.19/configure?ref_type=tags
  wine64:
    source: https://gitlab.winehq.org/wine/wine.git
    source-tag: wine-9.19
    source-depth: 1
    plugin: autotools
    autotools-configure-parameters:
      ## WINE_BUILD_OPTIONS:
      # - --without-ldap  # doesn't exist
      - --without-oss
      - --disable-winemenubuilder
      - --disable-win16
      - --disable-tests
      - --enable-archs=i386,x86_64
      ##
      - --enable-win64
      - --prefix=/opt/wine-devel-amd64
    build-packages:
      # added by me
      - flex 
      - bison
      # https://github.com/mmtrt/Wine-Builds/blob/master/create_ubuntu_bootstraps.sh
      # - build-dep  # not found
      # - wine-development  # probably requires winehq repo
      # - libsdl2  # not found
      - libvulkan1
      - ccache
      - gcc-9
      - g++-9
      # - wget  # already?
      - gcc-mingw-w64
      - g++-mingw-w64
      - libxpresent-dev
      - libjxr-dev
      - libusb-1.0-0-dev
      - libgcrypt20-dev
      - libpulse-dev
      - libudev-dev
      - libsane-dev
      - libv4l-dev
      - libkrb5-dev
      - libgphoto2-dev
      - liblcms2-dev
      - libcapi20-dev
      # - libjpeg62-dev  # conflicts with libjpeg-turbo8-dev, is a dep for something
      - samba-dev
      - libpcsclite-dev
      - libcups2-dev
      - libxcb-xkb-dev
    build-environment:  # see L2551 of wine/configure
      ## added by me
      - MAKEFLAGS: "-j$(nproc)"
      ## from mmtrt
      # stored values to be referenced later
      - CROSSCC_X32: "i686-w64-mingw32-gcc"
      - CROSSCXX_X32: "i686-w64-mingw32-g++"
      - CROSSCC_X64: "x86_64-w64-mingw32-gcc"
      - CROSSCXX_X64: "x86_64-w64-mingw32-g++"
      - CFLAGS_X32: "-march=i686 -msse2 -mfpmath=sse -O2 -ftree-vectorize"
      - CFLAGS_X64: "-march=x86-64 -msse3 -mfpmath=sse -O2 -ftree-vectorize"
      - CROSSCFLAGS_X32: "${CFLAGS_X32}"
      - CROSSCFLAGS_X64: "${CFLAGS_X64}"
      # needed for build
      - CC: "gcc-9"
      - CFLAGS: "${CFLAGS_X64}"
      - CXX: "g++-9"
      - CXXFLAGS: "${CFLAGS_X64}"
      - LDFLAGS: "-Wl,-O1,--sort-common,--as-needed"
      - CROSSLDFLAGS: "${LDFLAGS}"
      - CROSSCC: "${CROSSCC_X64}"  # not used?
      - CROSSCFLAGS: "${CROSSCFLAGS_X64}"
      - CROSSCXX: "${CROSSCXX_X64}"  # not used?
      - CROSSCXXFLAGS: "${CROSSCFLAGS_X64}"  # not used?

  wine32-tools:
    # after: [wine64]
    source: https://gitlab.winehq.org/wine/wine.git
    source-tag: wine-9.19
    source-depth: 1
    plugin: autotools
    autotools-configure-parameters:
      ## WINE_BUILD_OPTIONS:
      # - --without-ldap  # doesn't exist
      - --without-oss
      - --disable-winemenubuilder
      - --disable-win16
      - --disable-tests
      - --enable-archs=i386,x86_64
      ##
      - --prefix=/opt/wine-devel-x86
    build-packages:
      # added by me
      - flex 
      - bison
      # https://github.com/mmtrt/Wine-Builds/blob/master/create_ubuntu_bootstraps.sh
      # - build-dep  # not found
      # - wine-development  # probably requires winehq repo
      # - libsdl2  # not found
      - libvulkan1
      - ccache
      - gcc-9
      - g++-9
      # - wget  # already?
      - gcc-mingw-w64
      - g++-mingw-w64
      - libxpresent-dev
      - libjxr-dev
      - libusb-1.0-0-dev
      - libgcrypt20-dev
      - libpulse-dev
      - libudev-dev
      - libsane-dev
      - libv4l-dev
      - libkrb5-dev
      - libgphoto2-dev
      - liblcms2-dev
      - libcapi20-dev
      # - libjpeg62-dev  # conflicts with libjpeg-turbo8-dev, is a dep for something
      - samba-dev
      - libpcsclite-dev
      - libcups2-dev
      - libxcb-xkb-dev
    build-environment:
      ## added by me
      - MAKEFLAGS: "-j$(nproc)"
      ## mmtrt
      # stored values to be referenced later
      - CROSSCC_X32: "i686-w64-mingw32-gcc"
      - CROSSCXX_X32: "i686-w64-mingw32-g++"
      - CROSSCC_X64: "x86_64-w64-mingw32-gcc"
      - CROSSCXX_X64: "x86_64-w64-mingw32-g++"
      - CFLAGS_X32: "-march=i686 -msse2 -mfpmath=sse -O2 -ftree-vectorize"
      - CFLAGS_X64: "-march=x86-64 -msse3 -mfpmath=sse -O2 -ftree-vectorize"
      - CROSSCFLAGS_X32: "${CFLAGS_X32}"
      - CROSSCFLAGS_X64: "${CFLAGS_X64}"
      # needed for build
      - PKG_CONFIG_LIBDIR: /usr/lib/i386-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:/usr/local/lib/i386-linux-gnu/pkgconfig
      - CC: "gcc-9"
      - CFLAGS: "${CFLAGS_X32} -fno-cf-protection"
      - CXX: "g++-9"
      - CXXFLAGS: "${CFLAGS_X32}"
      - LDFLAGS: "-Wl,-O1,--sort-common,--as-needed"
      - CROSSLDFLAGS: "${LDFLAGS}"
      - i386_LDFLAGS: "$CROSSLDFLAGS"
      - CROSSCC: "${CROSSCC_X32}"  # not used?
      - i386_CC: "$CROSSCC"
      - CROSSCFLAGS: "${CROSSCFLAGS_X32}"
      - i386_CFLAGS: "$CROSSCFLAGS"
      - CROSSCXX: "${CROSSCXX_X32}"  # not used?
      - CROSSCXXFLAGS: "${CROSSCFLAGS_X32}"  # not used?

  wine32:
    after:
      - wine64
      - wine32-tools
    source: https://gitlab.winehq.org/wine/wine.git
    source-tag: wine-9.19
    source-depth: 1
    plugin: autotools
    autotools-configure-parameters:
      - --with-wine64=parts/wine64/build  # ref $PWD of wine64 build
      - --with-wine-tools=parts/wine32-tools/build  # ref $PWD of wine32-tools build
      ## from mmtrt, WINE_BUILD_OPTIONS:
      # - --without-ldap  # doesn't exist
      - --without-oss
      - --disable-winemenubuilder
      - --disable-win16
      - --disable-tests
      - --enable-archs=i386,x86_64
      ##
      - --prefix=/opt/wine-devel-amd64
    build-environment:
      ## added by me
      - MAKEFLAGS: "-j$(nproc)"
      ## mmtrt
      # stored values to be referenced later
      - CROSSCC_X32: "i686-w64-mingw32-gcc"
      - CROSSCXX_X32: "i686-w64-mingw32-g++"
      - CROSSCC_X64: "x86_64-w64-mingw32-gcc"
      - CROSSCXX_X64: "x86_64-w64-mingw32-g++"
      - CFLAGS_X32: "-march=i686 -msse2 -mfpmath=sse -O2 -ftree-vectorize"
      - CFLAGS_X64: "-march=x86-64 -msse3 -mfpmath=sse -O2 -ftree-vectorize"
      - CROSSCFLAGS_X32: "${CFLAGS_X32}"
      - CROSSCFLAGS_X64: "${CFLAGS_X64}"
      # needed for build
      - PKG_CONFIG_LIBDIR: /usr/lib/i386-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:/usr/local/lib/i386-linux-gnu/pkgconfig
      - CC: "gcc-9"
      - CFLAGS: "${CFLAGS_X64}"
      - CXX: "g++-9"
      - CXXFLAGS: "${CFLAGS_X64}"
      - LDFLAGS: "-Wl,-O1,--sort-common,--as-needed"
      - CROSSLDFLAGS: "${LDFLAGS}"
      - CROSSCC: "${CROSSCC_X64}"  # not used?
      - CROSSCFLAGS: "${CROSSCFLAGS_X64}"
      - CROSSCXX: "${CROSSCXX_X64}"  # not used?
      - CROSSCXXFLAGS: "${CROSSCFLAGS_X64}"  # not used?

  wine-cleanup:
    after:
      - wine64
      - wine32-tools
      - wine32
    plugin: nil
    stage:
      - -include
      - -usr/include
      - -usr/share/man
      - -opt/wine-devel/include
      - -opt/wine-devel/share
      - -opt/wine-devel/applications
      - -opt/wine-devel/bin/wine
      - -opt/wine-devel/bin/wine-preloader
    override-stage: |
      craftctl default
      ln opt/wine-devel/bin/wine opt/wine-devel/bin/wine64
      find . - type d -empty -delete
    stage-packages:
      - libcapi20-3t64
      - libexif12
      - libgphoto2-6t64
      - libgphoto2-port12t64
      - libsane1
      - libusb-1.0-0
      # - glib-networking  # doesn't fix Failed to load module: /home/nate/snap/oudedetai/common/.cache/gio-modules/libgiolibproxy.so

  oudedetai:
    ## just for testing
    source: https://github.com/FaithLife-Community/LogosLinuxInstaller.git
    source-branch: snap-pkg
    ##
    # source: https://github.com/FaithLife-Community/LogosLinuxInstaller/archive/refs/tags/${SNAPCRAFT_PROJECT_VERSION}.tar.gz
    plugin: python

  oudedetai-cleanup:
    after: [oudedetai]
    plugin: nil
    stage-packages:
      - jq
      - libncurses6
      - libncursesw6
      - python3-tk

