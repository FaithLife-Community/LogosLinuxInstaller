  wine-prep:
    # This saves having to repeat [64-bit] build-packages for each wine* part.
    # Also, build-packages from all parts are installed prior to the completion
    # of any single part, so any i386 build packages have to be installed in an
    # override scriptlet.
    source: https://gitlab.winehq.org/wine/wine.git
    source-tag: wine-9.19
    source-depth: 1
    plugin: dump
    override-build: |
      dpkg --add-architecture i386
      apt-get update
      apt-get --yes install \
        libvulkan1:i386 \
        libxpresent-dev:i386 \
        libjxr-dev:i386 \
        libusb-1.0-0-dev:i386 \
        libgcrypt20-dev:i386 \
        libpulse-dev:i386 \
        libudev-dev:i386 \
        libudev-dev:i386 \
        libsane-dev:i386 \
        libsane-dev:i386 \
        libv4l-dev:i386 \
        libgphoto2-dev:i386 \
        liblcms2-dev:i386 \
        libcapi20-dev:i386 \
        samba-dev:i386 \
        libpcsclite-dev:i386 \
        libcups2-dev:i386 \
        libxcb-xkb-dev:i386 \
        libwayland-bin:i386 \
        libwayland-dev:i386
      craftctl default
    build-packages:
      ## https://github.com/mmtrt/Wine-Builds/blob/master/create_ubuntu_bootstraps.sh
      # - build-dep  # not found
      # - wine-development  # probably requires winehq repo
      # - libsdl2  # joysticks
      - libvulkan1
      # - ccache  # requires up to 5GB extra space
      - gcc-9
      - g++-9
      # - wget  # not needed (already installed? unused?)
      - gcc-mingw-w64
      - g++-mingw-w64
      - libxpresent-dev
      - libjxr-dev
      - libusb-1.0-0-dev
      - libgcrypt20-dev
      - libpulse-dev
      - libudev-dev
      # - libsane-dev  # for scanners
      - libv4l-dev
      # - libkrb5-dev  # for kerberos
      - libgphoto2-dev
      - liblcms2-dev
      - libcapi20-dev
      # - libjpeg62-dev  # conflicts with libjpeg-turbo8-dev, is a dep for something
      - samba-dev
      - libpcsclite-dev
      - libcups2-dev
      - libxcb-xkb-dev
      ## oudedetai additions
      - flex 
      - bison
      - gcc-multilib
    stage-packages:
      - libcapi20-3t64
      - libexif12
      - libgphoto2-6t64
      - libgphoto2-port12t64
      - libusb-1.0-0
      # - glib-networking  # doesn't fix Failed to load module: /home/nate/snap/oudedetai/common/.cache/gio-modules/libgiolibproxy.so

  wine64:
    # https://github.com/mmtrt/Wine-Builds/blob/master/build_wine.sh
    # https://gitlab.winehq.org/wine/wine/-/wikis/Building-Wine
    # https://gitlab.winehq.org/wine/wine/-/blob/wine-9.19/configure?ref_type=tags
    after: [wine-prep]
    source: ../parts/wine-prep/src
    source-type: local
    plugin: autotools
    autotools-configure-parameters:
      ## WINE_BUILD_OPTIONS:
      # - --without-ldap  # doesn't exist
      - --without-oss
      - --disable-winemenubuilder
      - --disable-win16
      - --disable-tests
      - --enable-archs=i386,x86_64
      ## oudedetai additions; see 'configure --help'
      - --without-gphoto
      - --without-gssapi
      - --without-inotify
      - --without-krb5
      - --without-pcap
      - --without-sane
      ##
      - --enable-win64
      - --prefix=/opt/wine-devel-amd64
    build-environment:  # see L2551 of wine/configure
      ## mmtrt's stored values, to be referenced later
      - CROSSCC_X64: "x86_64-w64-mingw32-gcc"
      - CROSSCXX_X64: "x86_64-w64-mingw32-g++"
      - CFLAGS_X64: "-march=x86-64 -msse3 -mfpmath=sse -O2 -ftree-vectorize"
      #-- oudedetai additions & overrides
      #-- https://github.com/mmtrt/Wine-Builds/blob/master/create_ubuntu_bootstraps.sh
      #-- mmtrt uses chroots with different arches for building the 32-bit and
      #-- 64-bit parts, so he specifies the arch in CFLAGS. We build straight
      #-- on 64-bit, so we don't have to specify the arch.
      - CFLAGS_X64: "-msse3 -mfpmath=sse -O2 -ftree-vectorize"
      - MAKEFLAGS: "-j$(nproc)"
      #--
      - CROSSCFLAGS_X64: "${CFLAGS_X64}"
      ## values used for build
      - LDFLAGS: "-Wl,-O1,--sort-common,--as-needed"
      - CROSSLDFLAGS: "${LDFLAGS}"
      - CC: "gcc-9"
      - CXX: "g++-9"
      - CROSSCC: "${CROSSCC_X64}"
      - CROSSCXX: "${CROSSCXX_X64}"
      - CFLAGS: "${CFLAGS_X64}"
      - CXXFLAGS: "${CFLAGS_X64}"
      - CROSSCFLAGS: "${CROSSCFLAGS_X64}"
      - CROSSCXXFLAGS: "${CROSSCFLAGS_X64}"
    stage:
      - -*

  wine32-tools:
    after: [wine-prep]
    source: ../parts/wine-prep/src
    source-type: local
    plugin: autotools
    autotools-configure-parameters:
      ## WINE_BUILD_OPTIONS:
      # - --without-ldap  # doesn't exist
      - --without-oss
      - --disable-winemenubuilder
      - --disable-win16
      - --disable-tests
      - --enable-archs=i386,x86_64
      ## oudedetai additions; see 'configure --help'
      - --without-gphoto
      - --without-gssapi
      - --without-inotify
      - --without-krb5
      - --without-pcap
      - --without-sane
      ##
      - --prefix=/opt/wine-devel-x86
    build-environment:
      ## mmtrt's stored values, to be referenced later
      - CROSSCC_X32: "i686-w64-mingw32-gcc"
      - CROSSCXX_X32: "i686-w64-mingw32-g++"
      - CFLAGS_X32: "-march=i686 -msse2 -mfpmath=sse -O2 -ftree-vectorize"
      #-- oudedetai additions & overrides
      #-- https://github.com/mmtrt/Wine-Builds/blob/master/create_ubuntu_bootstraps.sh
      #-- mmtrt uses a 32-bit chroot for building, while we build straight on
      #-- 64-bit, so we remove the '-march=i686' flag.
      - CFLAGS_X32: "-msse2 -mfpmath=sse -O2 -ftree-vectorize"
      - MAKEFLAGS: "-j$(nproc)"
      #--
      - CROSSCFLAGS_X32: "${CFLAGS_X32}"
      ## values used for build
      - LDFLAGS: "-Wl,-O1,--sort-common,--as-needed"
      - CROSSLDFLAGS: "${LDFLAGS}"
      - PKG_CONFIG_LIBDIR: /usr/lib/i386-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:/usr/local/lib/i386-linux-gnu/pkgconfig
      - CC: "gcc-9"
      - CXX: "g++-9"
      - CROSSCC: "${CROSSCC_X32}"
      - CROSSCXX: "${CROSSCXX_X32}"
      - CFLAGS: "${CFLAGS_X32}"
      - CXXFLAGS: "${CFLAGS_X32}"
      - CROSSCFLAGS: "${CROSSCFLAGS_X32}"
      - CROSSCXXFLAGS: "${CROSSCFLAGS_X32}"
    stage:
      - -*

  wine32:
    after:
      - wine64
      - wine32-tools
    source: ../parts/wine-prep/src
    source-type: local
    plugin: autotools
    autotools-configure-parameters:
      - --with-wine64=../../wine64/build  # ref $PWD of wine64 build
      - --with-wine-tools=../../wine32-tools/build  # ref $PWD of wine32-tools build
      ## from mmtrt, WINE_BUILD_OPTIONS:
      # - --without-ldap  # doesn't exist
      - --without-oss
      - --disable-winemenubuilder
      - --disable-win16
      - --disable-tests
      - --enable-archs=i386,x86_64
      ## oudedetai additions; see 'configure --help'
      - --without-gphoto
      - --without-gssapi
      - --without-inotify
      - --without-krb5
      - --without-pcap
      - --without-sane
      ##
      - --prefix=/opt/wine-devel-amd64
    build-environment:
      ## mmtrt's stored values, to be referenced later
      - CROSSCC_X32: "i686-w64-mingw32-gcc"
      - CROSSCXX_X32: "i686-w64-mingw32-g++"
      - CFLAGS_X64: "-march=x86-64 -msse3 -mfpmath=sse -O2 -ftree-vectorize"
      #-- oudedetai additions & overrides
      #-- https://github.com/mmtrt/Wine-Builds/blob/master/create_ubuntu_bootstraps.sh
      #-- mmtrt uses a 32-bit chroot for building, while we build straight on
      #-- 64-bit, so we remove the '-march=x86_64' flag.
      - CFLAGS_X64: "-msse3 -mfpmath=sse -O2 -ftree-vectorize"
      - MAKEFLAGS: "-j$(nproc)"
      #--
      - CROSSCFLAGS_X64: "${CFLAGS_X64}"
      ## values used for build
      - LDFLAGS: "-Wl,-O1,--sort-common,--as-needed"
      - CROSSLDFLAGS: "${LDFLAGS}"
      - PKG_CONFIG_LIBDIR: /usr/lib/i386-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig:/usr/local/lib/i386-linux-gnu/pkgconfig
      - CC: "gcc-9"
      - CXX: "g++-9"
      - CROSSCC: "${CROSSCC_X32}"
      - CROSSCXX: "${CROSSCXX_X32}"
      - CFLAGS: "${CFLAGS_X64}"
      - CXXFLAGS: "${CFLAGS_X64}"
      - CROSSCFLAGS: "${CROSSCFLAGS_X64}"
      - CROSSCXXFLAGS: "${CROSSCFLAGS_X64}"
    stage:
      - -include
      - -usr/include
      - -usr/share/man
      - -opt/wine-devel-amd64/include
      - -opt/wine-devel-amd64/share
      - -opt/wine-devel-amd64/applications
      - -opt/wine-devel-amd64/bin/wine
      - -opt/wine-devel-amd64/bin/wine-preloader

  wine-cleanup:
    after: [wine32]
    plugin: nil
    override-stage: |
      ln opt/wine-devel-amd64/bin/wine64 opt/wine-devel-amd64/bin/wine
      find . -type d -empty -delete
      craftctl default

  oudedetai:
    ## just for testing
    source: https://github.com/FaithLife-Community/LogosLinuxInstaller.git
    source-branch: snap-pkg
    ##
    # source: https://github.com/FaithLife-Community/LogosLinuxInstaller/archive/refs/tags/${SNAPCRAFT_PROJECT_VERSION}.tar.gz
    plugin: python

  oudedetai-cleanup:
    after: [oudedetai]
    plugin: nil
    stage-packages:
      - jq
      - libncurses6
      - libncursesw6
      - python3-tk
