name: oudedetai
base: core24
version: v4.0.0-beta.5
summary: Install and maintain FaithLife's Logos Bible (Verbum) Software.
description: |
  This repository contains a Python program for installing and maintaining
  FaithLife's Logos Bible (Verbum) Software on Linux.

  This program is created and maintained by the FaithLife Community and is
  licensed under the MIT License.
grade: stable
confinement: strict
environment:
  WINE64_APPIMAGE_URL: https://github.com/FaithLife-Community/wine-appimages/releases/download/9.19-devel/wine-devel_9.19-x86_64.AppImage
  ICU_URL: https://github.com/FaithLife-Community/icu/releases/download/72.1-custom%2B4/icu-win.tar.gz
  CONFIG_FILE: ${SNAP_USER_COMMON}/${SNAPCRAFT_PROJECT_NAME}.json

apps:
  oudedetai:
    command: bin/run.sh

parts:
  bin:
    source: ./snap/bin
    plugin: dump
    organize:
      run.sh: bin/

  etc:
    source: ./snap/etc
    plugin: dump
    organize:
      oudedetai.json: etc/oudedetai.json

  icu:
    source: $ICU_URL
    plugin: dump
    organize:
      '*': $SNAP_USER_COMMON

  wine:
    source: $WINE64_APPIMAGE_URL
    plugin: dump
    override-build: |
      *.appimage --appimage-extract
      mv squashfs-root/* .
    prime:
      - bin
      - etc
      - opt
      - runtime
      - usr

  oudedetai:
    # source: https://github.com/FaithLife-Community/LogosLinuxInstaller/archive/refs/tags/${SNAPCRAFT_PROJECT_VERSION}.tar.gz
    source: https://github.com/FaithLife-Community/LogosLinuxInstaller.git  # just for testing
    plugin: python
    