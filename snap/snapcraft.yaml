name: oudedetai
base: core24
version: v4.0.0-beta.5
summary: Install and maintain FaithLife's Logos Bible (Verbum) Software.
description: |
  This repository contains a Python program for installing and maintaining
  FaithLife's Logos Bible (Verbum) Software on Linux.

  This program is created and maintained by the FaithLife Community and is
  licensed under the MIT License.
grade: stable
confinement: strict
environment:
  CONFIG_FILE: ${SNAP_USER_COMMON}/${SNAPCRAFT_PROJECT_NAME}.json
  # PYTHON_SITE_PACKAGES_PATH: $SNAP/lib/python3.12/site-packages
  # PYTHON_APT_PACKAGES_PATH: $SNAP/usr/lib/python3.12
  # PYTHON_LIB_DYNLOAD_PATH: $SNAP/usr/lib/python3.12/lib-dynload
  # TCL_LIBRARY: $SNAP/usr/share/tcltk/tcl8.6
  # TK_LIBRARY: $SNAP/usr/share/tcltk/tk8.6
  # PYTHONPATH: $PYTHON_SITE_PACKAGES_PATH:$PYTHON_APT_PACKAGES_PATH:$PYTHON_LIB_DYNLOAD_PATH:$TCL_LIBRARY:$TK_LIBRARY

apps:
  oudedetai:
    command: bin/run.sh
    plugs: # &allplugs
      - audio-playback
      - desktop
      - home
      - network
      - opengl
      - removable-media
      - wayland
      - x11

parts:
  bin:
    source: ./snap/bin
    plugin: dump
    organize:
      run.sh: bin/

  etc:
    source: ./snap/etc
    plugin: dump
    organize:
      oudedetai.json: etc/oudedetai.json

  icu:
    source: https://github.com/FaithLife-Community/icu/releases/download/72.1-custom%2B4/icu-win.tar.gz
    plugin: dump
    organize:
      '*': $SNAP_USER_COMMON

  wine:
    source: .  # "Failed to pull source" when URL is given here
    plugin: dump
    source-type: local
    build-packages:
      - wget
    override-pull: |
      file=wine-devel_9.19-x86_64.AppImage
      wget -q https://github.com/FaithLife-Community/wine-appimages/releases/download/9.19-devel/$file
      if [[ ! -r $file ]]; then
        exit 1
      fi
      chmod +x $file
      ./$file --appimage-extract >/dev/null
      if [[ ! -d squashfs-root ]]; then
        exit 1
      fi
      rm -f $file
    override-build: |
      cp --archive --no-dereference squashfs-root/* $CRAFT_PART_INSTALL
    stage:
      - -AppRun*
      - -.bundle.yml
      - -.DirIcon
      - -*.desktop
      - -*.svg
      - -lib64
      - -winedata
      - -wrapper
    stage-packages:
      - libcapi20-dev  # libcapi20.so.3
      - libgphoto2-dev  # libgphoto2.so.6, libgphoto2_port.so.12, 
      - ocl-icd-opencl-dev  # libOpenCL.so.1
      - libsane-dev  # libsane.so.1
      - libasound2-dev  # libasound.so.2
      - libgstreamer-plugins-base1.0-dev  # libgstaudio-1.0.so.0, libgsttag-1.0.so.0, libgstvideo-1.0.so.0
      - libgstreamer1.0-dev  # libgstreamer-1.0.so.0
      - libpulse-dev  # libpulse.so.0
      - libusb-1.0-0-dev  # libusb-1.0.so.0
      - libgl-dev  # libGL.so.1
      - libwayland-dev  # libwayland-client.so.0

  oudedetai:
    ## just for testing
    source: https://github.com/FaithLife-Community/LogosLinuxInstaller.git
    source-branch: snap-pkg
    ##
    # source: https://github.com/FaithLife-Community/LogosLinuxInstaller/archive/refs/tags/${SNAPCRAFT_PROJECT_VERSION}.tar.gz
    plugin: python

  oudedetai-pkgs:
    plugin: nil
    stage-packages:
      - libtinfo6
      - python3-tk
    